name: Update Blocklist

on:
  schedule:
    - cron: '0 21 * * *' # Run daily at midnight Africa/Nairobi (UTC+3)
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

concurrency:
  group: update-blocklist-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with latest main
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git fetch origin main
          git rebase --autostash origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate blocklist
        env:
          NSFW_SHIELD_HMAC_SECRET: ${{ secrets.NSFW_SHIELD_HMAC_SECRET }}
        run: python scripts/generate_blocklist.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Add all changes in the scripts directory safely
          git add scripts/
          # Only commit if there are changes
          if [ -n "$(git status --porcelain scripts/)" ]; then
            git commit -m "Auto-update blocklist (v$(cat scripts/version.txt))"
            git push
          else
            echo "No changes to commit"
          fi
